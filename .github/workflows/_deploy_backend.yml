name: _Deploy Backend

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      ref:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/docker/backend:${{ inputs.ref }}
          docker build -f backend/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/docker/backend:${{ inputs.ref }}
          gcloud run deploy backend \
            --image "$IMAGE" \
            --region ${{ vars.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }} \
            --set-env-vars "\
          FASTIFY_ADDRESS=0.0.0.0,\
          NODE_ENV=production,\
          CORS_ORIGIN=${{ vars.CORS_ORIGIN }},\
          CLOUDSQL_CONNECTION=${{ vars.CLOUDSQL_CONNECTION }},\
          DB_IAM_USER=${{ vars.DB_IAM_USER }},\
          DB_NAME=${{ vars.DB_NAME }},\
          BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }},\
          BETTER_AUTH_URL=${{ vars.BETTER_AUTH_URL }},\
          GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }},\
          GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }},\
          APPLE_CLIENT_ID=${{ secrets.APPLE_CLIENT_ID }},\
          APPLE_CLIENT_SECRET=${{ secrets.APPLE_CLIENT_SECRET }},\
          FRONTEND_URL=${{ vars.FRONTEND_URL }}"
