name: _Migrate Database

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      ref:
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Run database migration
        run: |
          IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/docker/backend:${{ inputs.ref }}
          gcloud run jobs deploy migrate \
            --image "$IMAGE" \
            --region ${{ vars.GCP_REGION }} \
            --service-account ${{ vars.CLOUD_RUN_SERVICE_ACCOUNT }} \
            --set-env-vars "CLOUDSQL_CONNECTION=${{ vars.CLOUDSQL_CONNECTION }},DB_IAM_USER=${{ vars.DB_IAM_USER }},DB_NAME=${{ vars.DB_NAME }}" \
            --command "node" \
            --args "dist/db/migrate.js" \
            --execute-now \
            --wait
